# Automated releases for Photrez.
# Triggered by pushing a version tag (e.g. v0.1.0, v1.2.3).
# Builds native installers on all three platforms and attaches them to the
# GitHub Release that is created from the tag.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libssl-dev libayatana-appindicator3-dev \
            librashader-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build & publish with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No TAURI_SIGNING_* secrets: this project ships installers without
          # an auto-updater, so release artifacts are not signed for updates.
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Photrez ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
