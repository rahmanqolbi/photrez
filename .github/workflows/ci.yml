name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── FRONTEND: TypeScript type-check + unit tests + build ───
  frontend:
    name: Frontend (TypeScript + Vitest + Build)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        working-directory: apps/desktop
        run: bunx playwright install chromium --with-deps

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Unit tests (node — fast)
        run: bun run --filter photrez-desktop test:unit

      - name: Build
        run: bun run build

      - name: E2E (Playwright)
        run: bun run test:e2e

  # ─── RUST: core + desktop (Tauri shell) tests ───
  rust:
    name: Rust tests
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Core tests
        run: cargo test -p photrez-core

      - name: Tauri shell tests
        run: cargo test -p photrez-desktop

  # ─── SECURITY: blocking dependency audit (Rust + JS) ───
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit (blocking)
        run: cargo audit --deny warnings

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bun audit (blocking for high/critical)
        run: bun audit --prod --severity high

  # ─── COMPONENT TESTS: jsdom-based (now passing — blocks PR) ───
  component-tests:
    name: Component tests (jsdom)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run component tests
        working-directory: apps/desktop
        run: bun run test:component
