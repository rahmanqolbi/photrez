name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── FRONTEND: TypeScript type-check + unit tests + build ───
  frontend:
    name: Frontend (TypeScript + Vitest + Build)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit (non-blocking)
        continue-on-error: true
        run: bun audit --prod || echo "Audit warnings ignored — non-blocking"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        working-directory: apps/desktop
        run: bunx playwright install chromium --with-deps

      - name: Type check
        run: bun run type-check

      - name: Unit tests (node — fast)
        run: bun run --filter photrez-desktop test:unit

      - name: Build
        run: bun run build

      - name: E2E (Playwright)
        run: bun run test:e2e

  # ─── RUST: core crate only (no Tauri toolchain needed) ───
  rust-core:
    name: Rust (core crate)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run core tests
        run: cargo test -p photrez-core

  # ─── COMPONENT TESTS: jsdom-based (now passing — blocks PR) ───
  component-tests:
    name: Component tests (jsdom)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run component tests
        working-directory: apps/desktop
        run: bun run test:component
