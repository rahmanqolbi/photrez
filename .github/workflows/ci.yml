name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Build and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Frontend tests
        run: pnpm --filter photrez-desktop test --run

      - name: Build frontend
        run: pnpm run build

      - name: Install Playwright browser
        run: pnpm --filter photrez-desktop exec playwright install chromium

      - name: Browser E2E
        run: pnpm run test:e2e

      - name: Rust core tests
        run: cargo test -p photrez-core

      - name: Rust workspace tests
        run: cargo test --workspace

  audit:
    name: Dependency audit
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: pnpm run audit
