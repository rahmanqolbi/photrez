version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    # Bun reads package.json + bun.lock; Dependabot's npm ecosystem covers it.
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
