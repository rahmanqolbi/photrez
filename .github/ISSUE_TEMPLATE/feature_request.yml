name: Feature request
description: Propose a scoped improvement for Photrez.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Photrez is pre-release. Please keep proposals scoped and explain the editing workflow they improve.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention simpler alternatives or existing workflows.
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Mention affected tools, panels, shortcuts, or file formats.
