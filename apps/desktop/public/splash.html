<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photrez Splash</title>
  <style>
    /* Sleek Reset and Base */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #111112;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }
    
    /* Center container mimicking a premium Adobe-like splash screen */
    .splash-container {
      position: absolute;
      inset: 0;
      background: #111112;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: fadeIn 0.3s ease-out forwards;
      opacity: 0;
    }

    .logo-wrapper {
      width: 96px;
      height: 96px;
      margin-bottom: 24px;
      animation: pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .app-name {
      color: #FFFFFF;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .loading-text {
      color: #888888;
      font-size: 11px;
      margin-top: 8px;
      letter-spacing: 0.02em;
    }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.97); }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <defs>
          <linearGradient id="brandGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFB31A" />
            <stop offset="100%" stop-color="#E15A17" />
          </linearGradient>
          <linearGradient id="bgDark" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2C2C2E" />
            <stop offset="100%" stop-color="#151516" />
          </linearGradient>
          <mask id="mountainMask" maskUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
            <rect x="-500" y="-500" width="2000" height="2000" fill="white" />
            <polygon points="250.4,320 300.86,127 307,127 357.6,320" fill="black" />
          </mask>
          <filter id="pShadow" x="-20%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
          </filter>
        </defs>
        <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#bgDark)" />
        <g transform="translate(8, 48) scale(0.85)" filter="url(#pShadow)">
          <path d="M 240 50 L 460 50 L 390 310 L 253 310 L 219 440 L 136 440 Z" fill="url(#brandGradient)" mask="url(#mountainMask)" />
          <circle cx="333" cy="175" r="30" fill="#FFE57F" mask="url(#mountainMask)" />
        </g>
      </svg>
    </div>
    <h1 class="app-name">PHOTREZ</h1>
    <div class="loading-text">Initializing Engine...</div>
  </div>
</body>
</html>
